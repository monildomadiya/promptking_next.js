name: Deploy to Server

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying code via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/promptking.in

            # Pull latest code
            git pull origin main

            # Install dependencies (skip dev deps in production)
            npm install --omit=dev

            # Build the Next.js app
            npm run build

            # Restart the app with PM2 (creates it if it doesn't exist)
            pm2 describe promptking.in > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart promptking.in --update-env
            else
              pm2 start npm --name "promptking.in" -- start
            fi
            pm2 save