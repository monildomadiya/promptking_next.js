    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#020202;color:#fff;font-family:'Outfit',system-ui,sans-serif;min-height:100vh}
    #app-splash{
      position:fixed;inset:0;z-index:99999;

      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;

    }
    .splash-logo-crown{

    }
    .splash-logo-text span{color:#e50914}
    .splash-bar{
      width:160px;height:3px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;
    }
    .splash-bar-fill{
      height:100%;width:0;border-radius:10px;
      background:linear-gradient(90deg,#e50914,#ff4d4d);
      animation:splashBar 1.4s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes splashPulse{
      0%,100%{box-shadow:0 0 20px rgba(229,9,20,0.3)}
      50%{box-shadow:0 0 40px rgba(229,9,20,0.6)}
    }
    @keyframes splashBar{
      0%{width:0}
      60%{width:75%}
      100%{width:100%}
    }
