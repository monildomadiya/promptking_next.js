<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Permanent Favicon - PromptKing Logo -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e50914" />
  <meta name="description" content="PromptKing - The best AI prompts marketplace" />

  <!-- Performance: Preconnect to critical domains -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <link rel="dns-prefetch" href="https://securetoken.googleapis.com">

  <!-- Critical inline CSS for instant splash screen - no FOUC / black screen -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background-color: #020202;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #020202;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    #app-splash.splash-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: splashFadeIn 0.6s ease both;
    }

    .splash-logo-img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 12px;
    }

    .splash-logo-text {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff;
    }

    .splash-logo-text span {
      color: #e50914;
    }

    .splash-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e50914;
      border-radius: 50%;
      animation: splashSpin 0.85s linear infinite;
      animation-delay: 0.2s;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes splashSpin {
      0% {
        opacity: 1;
        transform: rotate(0deg);
      }

      100% {
        opacity: 1;
        transform: rotate(360deg);
      }
    }

    @keyframes splashFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splash-tagline {
      font-size: 0.78rem;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      animation: splashFadeIn 0.6s ease 0.3s both;
    }
  </style>

  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1HK9T17LSR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-1HK9T17LSR');
  </script>
</head>

<body>
  <!-- Instant splash screen: visible before React JS loads -->
  <div id="app-splash" aria-hidden="true">
    <div class="splash-logo-wrap">
      <!-- Fixed: Ensure the image loads exactly what's needed (or scales elegantly) to prevent layout shifts/oversized warnings -->
      <img class="splash-logo-img" src="/favicon.png" alt="PromptKing" width="52" height="52" style="width: 52px; height: 52px; object-fit: contain;" />
      <div class="splash-logo-text">Prompt<span>King</span></div>
    </div>
    <div class="splash-spinner"></div>
    <p class="splash-tagline">Loading experience...</p>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
